<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Marathon Complete</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    background:#0b0f14;
    color:white;
    font-family:Arial,sans-serif;
}

.container{
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

h1{
    font-size:80px;
    font-weight:800;
    margin:0 0 25px 0;
}

.message{
    font-size:34px;
    line-height:1.5;
    margin-bottom:20px;
}

.small{
    margin-top:0;
    margin-bottom:30px;
    font-size:20px;
    color:#9ca3af;
    line-height:1.5;
}

.qr{
    width:240px;
    height:240px;
    object-fit:contain;
}
</style>
</head>
<body>

<div class="container">

    <h1>We Did It.</h1>

    <div class="message">
    42.2km completed in {{ elapsed }}.
</div>

    <div class="small">
        Thank you for all your support. If you'd still like to donate, please scan the QR code below.
    </div>

    <img
        src="/QRCode.PNG"
        alt="Donation QR Code"
        class="qr"
    >

</div>

</body>
</html>
