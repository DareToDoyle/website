<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>300KM Challenge Finale</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<style>
html,body{margin:0;min-height:100%;background:#0b0f14;color:#fff;font-family:Arial,sans-serif;overflow:hidden}
body{height:100vh;display:flex;flex-direction:column}
#header{
    position:relative;
    min-height:110px;
    background:#121821;
    padding:15px 25px;
    box-sizing:border-box;
    flex:0 0 auto;
}
.card.gps{
    min-width:120px;
}
#title{
    font-size:34px;
    font-weight:800;
}

#subtitle{
    font-size:18px;
    color:#9ca3af;
}
#statusBadge{
    display:inline-flex;
    align-items:center;
    gap:7px;
    margin-top:8px;
    padding:5px 9px;
    border:1px solid #14532d;
    border-radius:999px;
    background:#052e16;
    color:#bbf7d0;
    font-size:12px;
    font-weight:700;
}
#statusBadge::before{
    content:"";
    width:8px;
    height:8px;
    border-radius:50%;
    background:#22c55e;
}
#statusBadge.disconnected{
    border-color:#7f1d1d;
    background:#450a0a;
    color:#fecaca;
}
#statusBadge.disconnected::before{
    background:#ef4444;
}

#cards{
    position:absolute;
    top:50%;
    right:25px;
    transform:translateY(-50%);
    display:flex;
    gap:16px;
}
.card{background:#1a2230;border:1px solid #2f3a4e;border-radius:12px;padding:10px 16px;min-width:160px;box-sizing:border-box}
.label{font-size:12px;color:#9ca3af}
.value{font-size:28px;font-weight:700}
#progressWrapFooter{
    width:100%;
}
#progressTrack{height:26px;background:#222;border-radius:13px;overflow:hidden}
#progressBar{height:100%;width:0%;background:#3b82f6}
#progressText{text-align:center;margin-bottom:6px}
#content{
    display:flex;
    flex:1 1 auto;
    min-height:0;
}
#mainMap{
    flex:1;
}

.leaflet-tile{
    border:none !important;
    outline:none !important;
    image-rendering:auto !important;
}
.leaflet-container{background:#1f2937;touch-action:pan-y}
.leaflet-tile{border:none !important;outline:none !important}
.leaflet-pane img{image-rendering:auto}
#side{width:360px;padding:15px;box-sizing:border-box;background:#111827}
#miniTitle{font-weight:700;margin-bottom:10px}
#miniMap{height:280px;border-radius:10px;border:2px solid #374151}
#footer{
    min-height:70px;
    background:#121821;
    display:flex;
    align-items:center;
    padding:0 25px;
    box-sizing:border-box;
    flex:0 0 auto;
}
#finishView{
    display:none;
    min-height:100vh;
    padding:32px 20px;
    box-sizing:border-box;
    background:#0b0f14;
    text-align:center;
    align-items:center;
    justify-content:center;
    flex-direction:column;
}
#finishView h1{
    font-size:clamp(46px, 9vw, 80px);
    font-weight:800;
    margin:0 0 25px;
    line-height:1;
}
#finishMessage{
    font-size:clamp(24px, 5vw, 34px);
    line-height:1.45;
    margin-bottom:20px;
}
#finishSmall{
    max-width:720px;
    margin:0 0 30px;
    font-size:clamp(16px, 3vw, 20px);
    color:#9ca3af;
    line-height:1.5;
}
#finishView .qr{
    width:min(240px, 70vw);
    height:min(240px, 70vw);
    object-fit:contain;
}
body.finished{
    height:auto;
    min-height:100vh;
    overflow:auto;
}
body.finished #header,
body.finished #content,
body.finished #footer{
    display:none;
}
body.finished #finishView{
    display:flex;
}
.live-dot{
    width:9px;
    height:9px;
    background:#3b82f6;
    border:2px solid #fff;
    border-radius:50%;
}
.milestone-flag{
    position:relative;
    width:42px;
    height:50px;
}
.milestone-flag .flag-label{
    position:absolute;
    left:50%;
    top:0;
    transform:translateX(-50%);
    box-sizing:border-box;
    padding:3px 6px;
    background:rgba(15,23,42,.9);
    border:2px solid #0f172a;
    border-radius:6px;
    color:#fff;
    font-size:11px;
    font-weight:900;
    line-height:12px;
    text-align:center;
    white-space:nowrap;
    box-shadow:0 2px 6px rgba(0,0,0,.35);
}
.milestone-flag .flag-emoji{
    position:absolute;
    left:50%;
    bottom:0;
    transform:translateX(-50%);
    font-size:28px;
    line-height:28px;
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.55));
}
button{background:#2563eb;color:#fff;border:none;padding:12px 16px;border-radius:8px;cursor:pointer;min-height:44px}
@media (max-width: 1100px){
    html,body{overflow:auto}
    body{height:auto;min-height:100vh}
    #header{
        min-height:0;
        padding:14px 16px;
    }
    #title{
        font-size:clamp(24px, 7vw, 34px);
        line-height:1.05;
    }
    #subtitle{
        font-size:15px;
    }
    #cards{
        position:static;
        transform:none;
        display:grid;
        grid-template-columns:repeat(2, minmax(0, 1fr));
        gap:10px;
        margin-top:14px;
    }
    .card,
    .card.gps{
        min-width:0;
        padding:10px 12px;
    }
    .value{
        font-size:clamp(20px, 6vw, 28px);
        line-height:1.15;
    }
    #content{
        flex-direction:column;
        min-height:560px;
    }
    #mainMap{
        min-height:360px;
    }
    #side{
        width:100%;
        padding:12px 16px 16px;
    }
    #miniMap{
        height:220px;
    }
    #footer{
        position:sticky;
        bottom:0;
        min-height:76px;
        padding:0 16px;
        z-index:1000;
    }
}
@media (max-width: 430px){
    #cards{
        grid-template-columns:1fr;
    }
    #mainMap{
        min-height:340px;
    }
    #miniMap{
        height:190px;
    }
}
</style>
</head>
<body>
<div id="header">
<div id="title">300KM CHALLENGE FINALE</div>
<div id="subtitle">MARATHON DAY</div>
<div id="statusBadge">Connected</div>
<div id="cards">
<div class="card">
    <div class="label">DISTANCE</div>
    <div class="value" id="distance">0.00 km</div>
</div>

<div class="card">
    <div class="label">REMAINING</div>
    <div class="value" id="remaining">42.20 km</div>
</div>

<div class="card">
    <div class="label">ELAPSED</div>
    <div class="value" id="elapsed">00:00:00</div>
</div>

<div class="card gps">
    <div class="label">GPS</div>
    <div class="value" id="lastgps">LIVE</div>
</div>
</div>
</div>




<div id="content">
<div id="mainMap"></div>
<div id="side">
<div id="miniTitle">LIVE SATELLITE</div>
<div id="miniMap"></div>
</div>
</div>

<div id="footer">
<div id="progressWrapFooter">
    <div id="progressText">0%</div>
    <div id="progressTrack">
        <div id="progressBar"></div>
    </div>
</div>
</div>

<div id="finishView">
    <h1>We Did It.</h1>

    <div id="finishMessage">
        42.2km completed in <span id="finishElapsed">00:00:00</span>.
    </div>

    <div id="finishSmall">
        Thank you for all your support. If you'd still like to donate, please scan the QR code below.
    </div>

    <img
        src="QRCode.png"
        alt="Donation QR Code"
        class="qr"
    >
</div>

<script>
let cinematicMode = false;
let marathonFinished = false;
let backendConnected = true;
let updateTimer = null;
let healthTimer = null;
let cinematicTimer = null;
const API = "https://marathon-tracker.tail75edaa.ts.net";
const DEFAULT_LAT = 51.61844288587238;
const DEFAULT_LNG = -3.027420043945313;
const DESKTOP_OVERVIEW_ZOOM = 12;
const MOBILE_OVERVIEW_ZOOM = 11;
const DESKTOP_RUNNER_ZOOM = 15;
const MOBILE_RUNNER_ZOOM = 14;
const DESKTOP_MINI_ZOOM = 17;
const MOBILE_MINI_ZOOM = 16;
const lockedMapOptions = {
    zoomControl:false,
    attributionControl:false,
    dragging:false,
    touchZoom:false,
    scrollWheelZoom:false,
    doubleClickZoom:false,
    boxZoom:false,
    keyboard:false,
    tap:false
};
const mainMap=L.map('mainMap', lockedMapOptions);
const miniMap=L.map('miniMap', lockedMapOptions);

L.tileLayer(
'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
).addTo(mainMap);

L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
).addTo(miniMap);

const icon=L.divIcon({
    className:'',
    html:'<div class="live-dot"></div>',
    iconSize:[9,9]
});

let completedRoute=L.polyline(
    [],
    {
        weight:5,
        color:'#60a5fa',
        smoothFactor:1,
        renderer:L.canvas()
    }
).addTo(mainMap);

let remainingRoute=L.polyline(
    [],
    {
        weight:5,
        color:'#111827',
        smoothFactor:1,
        renderer:L.canvas()
    }
).addTo(mainMap);

let routeCoords = [];
let milestoneMarkers = [];

let gpsMarker=L.marker(
    [0,0],
    {
        icon,
        interactive:false
    }
).addTo(miniMap);

let mainGpsMarker=L.marker(
    [0,0],
    {
        icon:icon,
        interactive:false,
        zIndexOffset:1000
    }
).addTo(mainMap);

let miniRouteLine=L.polyline(
    [],
    {
        weight:2,
        color:'#3b82f6'
    }
).addTo(miniMap);

function isMobileViewport(){
    return window.matchMedia('(max-width: 700px)').matches;
}

function overviewZoom(){
    return isMobileViewport()
        ? MOBILE_OVERVIEW_ZOOM
        : DESKTOP_OVERVIEW_ZOOM;
}

function runnerZoom(){
    return isMobileViewport()
        ? MOBILE_RUNNER_ZOOM
        : DESKTOP_RUNNER_ZOOM;
}

function miniRunnerZoom(){
    return isMobileViewport()
        ? MOBILE_MINI_ZOOM
        : DESKTOP_MINI_ZOOM;
}

function setOverviewView(){
    mainMap.setView(
        [DEFAULT_LAT, DEFAULT_LNG],
        overviewZoom(),
        {
            animate:false
        }
    );
}

function api(path){
    return `${API}${path}`;
}

function setBackendConnected(isConnected){
    backendConnected = isConnected;
    statusBadge.classList.toggle(
        'disconnected',
        !isConnected
    );
    statusBadge.innerText = isConnected
        ? 'Connected'
        : 'Disconnected';

    if(!isConnected){
        lastgps.innerText = 'Disconnected';
    }
}

async function fetchJson(path, options){
    const response = await fetch(
        api(path),
        options
    );

    if(!response.ok){
        throw new Error(
            `Request failed: ${response.status}`
        );
    }

    return response.json();
}

async function loadRoute(){
 const route=await fetchJson('/route');
routeCoords = route.map(
    p => [p.lat,p.lon]
);

remainingRoute.setLatLngs(routeCoords);
miniRouteLine.setLatLngs(routeCoords);
await loadMilestones();
setOverviewView();
remainingRoute.bringToFront();
completedRoute.bringToFront();
mainGpsMarker.setZIndexOffset(1000);
}

async function loadMilestones(){

    const milestones = await fetchJson('/milestones');

    milestoneMarkers.forEach(
        marker => marker.remove()
    );
    milestoneMarkers = [];

    milestones.forEach(milestone => {

        const isFinish = milestone.type === 'finish';
        const icon = L.divIcon({
            className:'',
            html:
                '<div class="milestone-flag ' +
                (isFinish ? 'finish' : '') +
                '">' +
                '<div class="flag-label">' +
                milestone.name +
                '</div>' +
                '<div class="flag-emoji">' +
                (isFinish ? '🏁' : '🚩') +
                '</div>' +
                '</div>',
            iconSize:[42,50],
            iconAnchor:[21,50]
        });

        const marker = L.marker(
            [milestone.lat, milestone.lon],
            {
                icon:icon,
                interactive:false,
                zIndexOffset:700
            }
        ).addTo(mainMap);

        milestoneMarkers.push(marker);
    });
}

function formatElapsedSeconds(totalSeconds){

    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;

    return String(hours).padStart(2,'0') + ':' +
        String(minutes).padStart(2,'0') + ':' +
        String(seconds).padStart(2,'0');
}

function showFinishView(stats){
    finishElapsed.innerText = formatElapsedSeconds(
        stats.elapsed_seconds || 0
    );
    document.body.classList.add('finished');

    clearInterval(updateTimer);
    clearInterval(healthTimer);
    clearInterval(cinematicTimer);
}

async function update(){

try{
 const stats=await fetchJson('/stats');

 elapsed.innerText = formatElapsedSeconds(
    stats.elapsed_seconds || 0
);

if(
    !marathonFinished &&
    (stats.progress||0) >= 100
){

    marathonFinished = true;

    showFinishView(stats);
    return;
}

 distance.innerText=(stats.distance_km||0).toFixed(2)+' km';
 remaining.innerText=(stats.remaining_km||0).toFixed(2)+' km';
 //pace.innerText=(stats.pace_min_km||0)+' min/km';
 //eta.innerText=stats.eta_clock||'--:--';

 const gpsAge=stats.last_update_seconds||0;

if(gpsAge<=15){
    lastgps.innerText='LIVE';
}
else if(gpsAge<=60){
    lastgps.innerText='GOOD';
}
else{
    lastgps.innerText='DELAYED';
}

 progressBar.style.width=(stats.progress||0)+'%';
 progressText.innerText=(stats.progress||0)+'%';
 renderRouteProgress(stats);



 const pts=await fetchJson('/points');
 if(pts.length){

   const p=pts[pts.length-1];

   gpsMarker.setLatLng([p.lat,p.lon]);

mainGpsMarker.setLatLng([p.lat,p.lon]);

miniMap.setView(
    [p.lat,p.lon],
    miniRunnerZoom(),
    {
        animate:false
    }
);
}

}
catch(error){
    setBackendConnected(false);
}

}
function cinematicZoom(){

    if(cinematicMode) return;

    cinematicMode = true;

    fetch(api('/points'))
    .then(r => r.json())
    .then(points => {

        if(!points.length){
            cinematicMode = false;
            return;
        }

        const p = points[points.length - 1];

        // Snap to runner
        mainMap.setView(
            [p.lat, p.lon],
            runnerZoom(),
            {
                animate:false
            }
        );

        // Stay there 15 seconds
        setTimeout(() => {

            // Snap back to overview
            setOverviewView();

            cinematicMode = false;

        }, 15000);

    })
    .catch(() => {
        cinematicMode = false;
        setBackendConnected(false);
    });
}

async function newMarathon(){
 if(!confirm('Start a new marathon?')) return;
 await fetch(api('/new-marathon'),{method:'POST'});
 location.reload();
}
async function pollHealth(){
    try{
        const health = await fetchJson('/health');
        setBackendConnected(
            health.status === 'ok'
            && health.gps_connected
            && health.route_loaded
        );
    }
    catch(error){
        setBackendConnected(false);
    }
}

loadRoute().catch(
    () => setBackendConnected(false)
);

window.addEventListener('resize', () => {
    mainMap.invalidateSize();
    miniMap.invalidateSize();

    if(!cinematicMode){
        setOverviewView();
    }
});

function renderRouteProgress(stats){

    if(routeCoords.length === 0) return;

    const routeIndex = Math.max(
        0,
        Math.min(
            stats.route_index || 0,
            routeCoords.length - 1
        )
    );

    const routePosition = stats.route_position
        ? [stats.route_position.lat, stats.route_position.lon]
        : null;

    let completed = routeCoords.slice(
        0,
        routeIndex
    );

    if(routePosition){
        completed.push(routePosition);
    }

    let remaining = routeCoords.slice(
        routeIndex
    );

    if(routePosition){
        remaining = [
            routePosition,
            ...remaining
        ];
    }

completedRoute.setLatLngs(
    completed
);

remainingRoute.setLatLngs(
    remaining
);
}
update();
updateTimer = setInterval(update,1000);
pollHealth();
healthTimer = setInterval(pollHealth,10000);
cinematicTimer = setInterval(cinematicZoom,30000);
</script>
</body>
</html>
