<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Mega Miles marathon completed by DareToDoyle.">
    <link rel="icon" type="image/png" href="LOGO.png">
    <title>Marathon Completed | DareToDoyle</title>

    <style>
        html,
        body{
            margin:0;
            min-height:100%;
            background:#0b0f14;
            color:#fff;
            font-family:Arial,sans-serif;
            overflow-x:hidden;
        }

        body{
            min-height:100vh;
        }

        #finishView{
            min-height:100vh;
            padding:32px 20px;
            box-sizing:border-box;
            background:#0b0f14;
            text-align:center;
            display:flex;
            align-items:center;
            justify-content:center;
            flex-direction:column;
        }

        #finishView h1{
            font-size:clamp(46px, 9vw, 80px);
            font-weight:800;
            margin:0 0 25px;
            line-height:1;
            text-transform:uppercase;
        }

        #finishMessage{
            font-size:clamp(24px, 5vw, 34px);
            font-weight:800;
            line-height:1.45;
            margin-bottom:20px;
            text-transform:uppercase;
        }

        #finishSmall{
            max-width:720px;
            margin:0 0 30px;
            font-size:clamp(16px, 3vw, 20px);
            color:#9ca3af;
            line-height:1.5;
        }

        #finishStats{
            display:grid;
            grid-template-columns:repeat(2, minmax(0, 1fr));
            gap:16px;
            width:min(560px, 100%);
            margin:0 0 30px;
        }

        .card{
            background:#1a2230;
            border:1px solid #2f3a4e;
            border-radius:12px;
            padding:16px;
            box-sizing:border-box;
            min-width:0;
            box-shadow:0 18px 40px rgba(0,0,0,.22);
        }

        .label{
            font-size:12px;
            color:#9ca3af;
            font-weight:800;
            letter-spacing:0;
        }

        .value{
            margin-top:6px;
            font-size:clamp(28px, 8vw, 42px);
            font-weight:800;
            line-height:1.05;
        }

        #finishActions{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
            justify-content:center;
            width:min(560px, 100%);
        }

        .action-link{
            display:inline-flex;
            align-items:center;
            justify-content:center;
            min-height:44px;
            padding:0 14px;
            border-radius:10px;
            background:#2563eb;
            color:#fff;
            font-size:14px;
            font-weight:800;
            text-decoration:none;
            box-sizing:border-box;
            transition:transform .18s ease, background .18s ease, box-shadow .18s ease;
            flex:1 1 210px;
        }

        .action-link.secondary{
            background:#0f172a;
            border:1px solid #334155;
        }

        .action-link:hover,
        .action-link:focus-visible{
            background:#3b82f6;
            box-shadow:0 10px 22px rgba(37,99,235,.25);
            transform:translateY(-2px);
            outline:none;
        }

        .action-link.secondary:hover,
        .action-link.secondary:focus-visible{
            background:#1e293b;
            box-shadow:0 10px 22px rgba(15,23,42,.35);
        }

        @media (max-width: 520px){
            #finishView{
                padding:28px 16px;
            }

            #finishStats{
                grid-template-columns:1fr;
                gap:10px;
            }

            .card{
                padding:14px 12px;
            }

            #finishActions{
                flex-direction:column;
            }

            .action-link{
                width:100%;
                flex:0 0 auto;
            }
        }
    </style>
</head>
<body>
    <main id="finishView" aria-labelledby="completeTitle">
        <h1 id="completeTitle">Marathon Completed</h1>

        <div id="finishMessage">
            42.2 KM COMPLETED
        </div>

        <div id="finishSmall">
            Final Time: 11:29:12
        </div>

        <section id="finishStats" aria-label="Final marathon statistics">
            <div class="card">
                <div class="label">DISTANCE COMPLETED</div>
                <div class="value">42.2 km</div>
            </div>

            <div class="card">
                <div class="label">FINAL TIME</div>
                <div class="value">11:29:12</div>
            </div>
        </section>

        <nav id="finishActions" aria-label="Marathon completion actions">
            <a
                class="action-link"
                href="https://fundraise.cfcs.org.uk/fundraisers/jacquedoyle-pearce/megamiles"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Donate to Mega Miles in a new tab"
            >Donate to Mega Miles</a>

            <a
                class="action-link secondary"
                href="https://www.instagram.com/daretofatty/"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Follow the journey on Instagram in a new tab"
            >Follow the Journey</a>
        </nav>
    </main>
</body>
</html>
